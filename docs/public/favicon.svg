<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Brand violet background -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>
  <!-- K + sphere scaled up to fill the rect -->
  <g transform="translate(16,16) scale(1.18) translate(-16,-16)">
    <!-- K: vertical bar -->
    <line x1="9" y1="7" x2="9" y2="25" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
    <!-- K: upper arm -->
    <line x1="9" y1="16" x2="20" y2="7" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
    <!-- K: lower arm -->
    <line x1="9" y1="16" x2="19" y2="24" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
    <!-- Cyan sphere inscribed in the V of the K -->
    <circle cx="20" cy="16" r="5.5" fill="#22d3ee"/>
  </g>
</svg>
