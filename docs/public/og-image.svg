<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
	<defs>
		<!-- Violet radial glow behind logo -->
		<radialGradient id="glow" cx="50%" cy="45%" r="45%">
			<stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
			<stop offset="100%" stop-color="#111113" stop-opacity="0"/>
		</radialGradient>
		<!-- Subtle top border gradient -->
		<linearGradient id="topBorder" x1="0" y1="0" x2="1200" y2="0">
			<stop offset="0%" stop-color="#111113"/>
			<stop offset="30%" stop-color="#7c3aed"/>
			<stop offset="70%" stop-color="#22d3ee"/>
			<stop offset="100%" stop-color="#111113"/>
		</linearGradient>
	</defs>

	<!-- Background -->
	<rect width="1200" height="630" fill="#111113"/>

	<!-- Top accent bar -->
	<rect width="1200" height="3" fill="url(#topBorder)"/>

	<!-- Background glow -->
	<rect width="1200" height="630" fill="url(#glow)"/>

	<!-- Logo mark — scaled up K from favicon -->
	<g transform="translate(520, 160) scale(3.5)">
		<rect width="32" height="32" rx="7" fill="#7c3aed"/>
		<g transform="translate(16,16) scale(1.18) translate(-16,-16)">
			<line x1="9" y1="7" x2="9" y2="25" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
			<line x1="9" y1="16" x2="20" y2="7" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
			<line x1="9" y1="16" x2="19" y2="24" stroke="white" stroke-width="3.25" stroke-linecap="round"/>
			<circle cx="20" cy="16" r="5.5" fill="#22d3ee"/>
		</g>
	</g>

	<!-- Brand name -->
	<text x="600" y="340" text-anchor="middle"
		font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
		font-weight="600" font-size="56" fill="#ededef" letter-spacing="-1">
		Krometrail
	</text>

	<!-- Tagline -->
	<text x="600" y="390" text-anchor="middle"
		font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
		font-weight="400" font-size="24" fill="#71717a">
		AI Agent Debugging &amp; Browser Observation
	</text>

	<!-- Decorative: small feature pills -->
	<g font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500">
		<!-- DAP pill -->
		<rect x="310" y="440" width="130" height="32" rx="16" fill="none" stroke="#7c3aed" stroke-opacity="0.5"/>
		<text x="375" y="461" text-anchor="middle" fill="#7c3aed">10 Languages</text>

		<!-- MCP pill -->
		<rect x="460" y="440" width="120" height="32" rx="16" fill="none" stroke="#7c3aed" stroke-opacity="0.5"/>
		<text x="520" y="461" text-anchor="middle" fill="#7c3aed">MCP Server</text>

		<!-- Browser pill -->
		<rect x="600" y="440" width="150" height="32" rx="16" fill="none" stroke="#22d3ee" stroke-opacity="0.5"/>
		<text x="675" y="461" text-anchor="middle" fill="#22d3ee">Browser CDP</text>

		<!-- CLI pill -->
		<rect x="770" y="440" width="120" height="32" rx="16" fill="none" stroke="#22d3ee" stroke-opacity="0.5"/>
		<text x="830" y="461" text-anchor="middle" fill="#22d3ee">CLI + DAP</text>
	</g>

	<!-- Bottom subtle line -->
	<line x1="400" y1="520" x2="800" y2="520" stroke="#27272a" stroke-width="1"/>

	<!-- URL -->
	<text x="600" y="555" text-anchor="middle"
		font-family="'JetBrains Mono', 'Fira Code', monospace"
		font-weight="400" font-size="16" fill="#52525b">
		krometrail.dev
	</text>
</svg>
