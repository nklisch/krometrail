name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Build linux-x64
        run: bun run build:linux-x64

      - name: Build linux-arm64
        run: bun run build:linux-arm64

      - name: Build darwin-x64
        run: bun run build:darwin-x64

      - name: Build darwin-arm64
        run: bun run build:darwin-arm64

      - name: Build windows-x64
        run: bun run build:windows-x64

      - name: Attest linux-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/krometrail-linux-x64

      - name: Attest linux-arm64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/krometrail-linux-arm64

      - name: Attest darwin-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/krometrail-darwin-x64

      - name: Attest darwin-arm64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/krometrail-darwin-arm64

      - name: Attest windows-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/krometrail-windows-x64.exe

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate checksums
        run: cd dist && sha256sum krometrail-* > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/krometrail-*
            dist/checksums.txt

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
